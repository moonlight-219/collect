<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — 收藏夹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --sidebar-w:260px;
  --radius:10px;
  --font-display:'Syne',system-ui,sans-serif;
  --font-body:'Manrope',system-ui,sans-serif;
  --font-mono:'SF Mono','Cascadia Code','Fira Code',monospace;
}

/* ═══ Dark Theme ═══ */
[data-theme="dark"]{
  --bg:#08080a;
  --bg-sidebar:#0b0b0e;
  --bg-card:rgba(255,255,255,0.02);
  --bg-card-hover:rgba(255,255,255,0.045);
  --bg-modal:#111114;
  --bg-input:rgba(255,255,255,0.035);
  --bg-tag:rgba(255,255,255,0.03);
  --bg-del:rgba(0,0,0,0.5);
  --border:rgba(255,255,255,0.06);
  --border-hover:rgba(255,255,255,0.14);
  --border-input:rgba(255,255,255,0.06);
  --text-1:#e4e4e8;
  --text-2:#85858e;
  --text-3:#45454e;
  --accent:#c8a24e;
  --accent-lo:rgba(200,162,78,0.08);
  --accent-glow:rgba(200,162,78,0.06);
  --accent-focus:rgba(200,162,78,0.3);
  --scrollbar:rgba(255,255,255,0.07);
  --overlay:rgba(0,0,0,0.6);
  --btn-primary-text:#0a0a0c;
  --select-option-bg:#111114;
}

/* ═══ Light Theme ═══ */
[data-theme="light"]{
  --bg:#f5f4f1;
  --bg-sidebar:#edecea;
  --bg-card:#ffffff;
  --bg-card-hover:#ffffff;
  --bg-modal:#ffffff;
  --bg-input:rgba(0,0,0,0.03);
  --bg-tag:rgba(0,0,0,0.04);
  --bg-del:rgba(255,255,255,0.85);
  --border:rgba(0,0,0,0.07);
  --border-hover:rgba(0,0,0,0.15);
  --border-input:rgba(0,0,0,0.08);
  --text-1:#1a1a1e;
  --text-2:#6b6b73;
  --text-3:#a0a0a8;
  --accent:#a8872e;
  --accent-lo:rgba(168,135,46,0.08);
  --accent-glow:rgba(168,135,46,0.08);
  --accent-focus:rgba(168,135,46,0.3);
  --scrollbar:rgba(0,0,0,0.1);
  --overlay:rgba(0,0,0,0.3);
  --btn-primary-text:#ffffff;
  --select-option-bg:#ffffff;
}

html{font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text-1);
  overflow:hidden;
  height:100vh;
  transition:background .35s,color .35s;
}

.loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;color:var(--text-2);font-size:14px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.layout{display:flex;height:100vh;position:relative;z-index:1}

/* ─── sidebar ─── */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  height:100vh;
  background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:background .35s,border-color .35s;
}

/* ─── logo ─── */
.sidebar-header{
  padding:26px 20px 22px;
  display:flex;align-items:center;gap:10px;
}

.logo-mark{
  width:26px;height:26px;
  border:1.5px solid var(--accent);
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  flex-shrink:0;
  transition:border-color .35s;
}
.logo-mark::before{
  content:'';width:7px;height:7px;
  background:var(--accent);border-radius:1.5px;
  transition:background .35s;
}

.logo-text{
  font-family:var(--font-display);
  font-weight:800;font-size:1rem;
  letter-spacing:.08em;
  color:var(--text-1);
  transition:color .35s;
}
.logo-sub{
  font-size:.68rem;
  color:var(--text-3);
  font-weight:400;
  margin-left:auto;
  font-family:var(--font-mono);
  letter-spacing:.02em;
  transition:color .35s;
}

/* ─── search ─── */
.search-wrap{
  padding:0 16px 18px;
  position:relative;
}
.search-inner{
  position:relative;
  display:flex;align-items:center;
}
.search-inner svg.search-icon{
  position:absolute;left:12px;
  width:14px;height:14px;
  color:var(--text-3);
  transition:color .2s;
  pointer-events:none;
}
.search-wrap:focus-within .search-icon{color:var(--accent)}

.search-input{
  width:100%;
  padding:9px 34px 9px 34px;
  background:var(--bg-input);
  border:1px solid var(--border-input);
  border-radius:8px;
  color:var(--text-1);
  font-family:var(--font-body);
  font-size:.82rem;
  outline:none;
  transition:border-color .25s,background .25s,color .35s;
}
.search-input::placeholder{color:var(--text-3)}
.search-input:focus{border-color:var(--accent-focus)}

.search-kbd{
  position:absolute;right:10px;
  font-family:var(--font-mono);font-size:.62rem;
  color:var(--text-3);
  padding:2px 5px;
  border:1px solid var(--border);
  border-radius:3px;
  line-height:1.4;
  pointer-events:none;
  transition:color .35s,border-color .35s;
}

/* ─── nav ─── */
.nav{
  flex:1;overflow-y:auto;
  padding:2px 10px 12px;
}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;
  border-radius:7px;
  cursor:pointer;
  transition:background .2s,border-color .2s,opacity .2s;
  position:relative;
  margin-bottom:1px;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--bg-card-hover)}
.nav-item.active{
  background:var(--accent-lo);
  border-color:rgba(200,162,78,0.08);
}
.nav-item.active .nav-label{color:var(--accent)}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-item.active .nav-count{color:var(--accent);opacity:.6}

.nav-item.active::before{
  content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);
  width:2.5px;height:16px;
  background:var(--accent);
  border-radius:0 3px 3px 0;
  transition:background .35s;
}

.nav-icon{
  width:15px;height:15px;flex-shrink:0;
  color:var(--text-3);
  transition:color .2s;
}
.nav-icon svg{width:100%;height:100%}
.nav-label{
  flex:1;font-size:.82rem;font-weight:500;
  color:var(--text-2);
  transition:color .2s;
  letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nav-count{
  font-family:var(--font-mono);font-size:.68rem;
  color:var(--text-3);
  transition:color .2s;
  flex-shrink:0;
}

/* ─── main ─── */
.main{
  flex:1;overflow-y:auto;
  padding:0 40px 60px;
  display:flex;flex-direction:column;
}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:5px}

/* ─── top bar ─── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 24px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  margin-bottom:28px;
  transition:border-color .35s;
}
.topbar-left{
  display:flex;align-items:baseline;gap:14px;
}
.main-title{
  font-family:var(--font-display);
  font-weight:700;font-size:1.4rem;
  letter-spacing:.02em;
  color:var(--text-1);
  transition:color .35s;
}
.main-subtitle{
  font-size:.78rem;
  color:var(--text-3);
  font-family:var(--font-mono);
  transition:color .35s;
}

.topbar-right{
  display:flex;align-items:center;gap:6px;
}

/* top bar buttons */
.tb-btn{
  padding:7px 12px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:7px;
  color:var(--text-2);
  font-family:var(--font-body);
  font-size:.76rem;font-weight:500;
  cursor:pointer;
  transition:border-color .25s,color .25s,background .25s;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.tb-btn:hover{
  border-color:var(--border-hover);
  color:var(--text-1);
  background:var(--bg-card-hover);
}
.tb-btn.accent:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-lo);
}
.tb-btn svg{width:13px;height:13px;flex-shrink:0}

.tb-btn-icon{
  padding:0;width:32px;height:32px;
  justify-content:center;
}
.tb-btn-icon svg{width:15px;height:15px}

/* ─── dropdown menu ─── */
.dropdown{position:relative}
.dropdown-menu{
  position:absolute;top:calc(100% + 6px);right:0;
  min-width:150px;
  background:var(--bg-modal);
  border:1px solid var(--border);
  border-radius:9px;
  padding:5px;
  z-index:500;
  opacity:0;pointer-events:none;
  transform:translateY(-4px);
  transition:opacity .2s cubic-bezier(.25,.8,.25,1),transform .2s cubic-bezier(.25,.8,.25,1);
  box-shadow:0 8px 30px rgba(0,0,0,0.18);
}
.dropdown.open .dropdown-menu{opacity:1;pointer-events:auto;transform:translateY(0)}
.dropdown-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  border-radius:6px;
  font-size:.8rem;font-weight:500;
  color:var(--text-2);
  cursor:pointer;
  transition:background .15s,color .15s;
  border:none;background:none;width:100%;
  font-family:var(--font-body);
  text-align:left;
}
.dropdown-item:hover{background:var(--bg-card-hover);color:var(--text-1)}
.dropdown-item svg{width:14px;height:14px;flex-shrink:0;color:var(--text-3)}
.dropdown-item:hover svg{color:var(--text-2)}

/* ─── context menu ─── */
.ctx-menu{
  position:fixed;z-index:3000;
  min-width:170px;
  background:var(--bg-modal);
  border:1px solid var(--border);
  border-radius:9px;
  padding:5px;
  opacity:0;pointer-events:none;
  transform:scale(.96);
  transition:opacity .15s cubic-bezier(.25,.8,.25,1),transform .15s cubic-bezier(.25,.8,.25,1);
  box-shadow:0 8px 30px rgba(0,0,0,0.22);
}
.ctx-menu.open{opacity:1;pointer-events:auto;transform:scale(1)}
.ctx-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:6px;
  font-size:.8rem;font-weight:500;
  color:var(--text-2);cursor:pointer;
  transition:background .15s,color .15s;
  border:none;background:none;width:100%;
  font-family:var(--font-body);text-align:left;
}
.ctx-item:hover{background:var(--bg-card-hover);color:var(--text-1)}
.ctx-item svg{width:14px;height:14px;flex-shrink:0;color:var(--text-3)}
.ctx-item:hover svg{color:var(--text-2)}
.ctx-item.danger{color:#e85d5d}
.ctx-item.danger svg{color:#e85d5d}
.ctx-item.danger:hover{background:rgba(232,93,93,0.08)}
.ctx-sep{height:1px;background:var(--border);margin:4px 8px}
.ctx-header{
  padding:4px 12px 3px;
  font-size:.68rem;
  color:var(--text-3);
  font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
  font-family:var(--font-mono);
}

/* ─── grid ─── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;
}

/* drag states */
.card.dragging{opacity:.35;transform:scale(.96)!important}
.card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-lo)}
.nav-item.dragging{opacity:.35}
.nav-item.drag-over{background:var(--accent-lo);border-color:rgba(200,162,78,0.15)}
.card[draggable="true"],.nav-item[draggable="true"]{cursor:grab}
.card.dragging,.nav-item.dragging{cursor:grabbing}

/* ─── card ─── */
.card{
  padding:18px 18px 16px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
  transition:background .3s cubic-bezier(.25,.8,.25,1),border-color .3s cubic-bezier(.25,.8,.25,1),box-shadow .3s cubic-bezier(.25,.8,.25,1),transform .3s cubic-bezier(.25,.8,.25,1);
  will-change:transform,opacity;
  position:relative;
  overflow:hidden;
  text-decoration:none;
  display:flex;
  flex-direction:column;
  gap:12px;
  animation:cardIn .5s cubic-bezier(.25,.8,.25,1) both;
}
[data-theme="dark"] .card:hover{
  background:var(--bg-card-hover);
  border-color:var(--border-hover);
  box-shadow:0 2px 20px var(--accent-glow),0 0 0 1px rgba(200,162,78,0.04);
  transform:translateY(-2px);
}
[data-theme="light"] .card:hover{
  background:var(--bg-card-hover);
  border-color:var(--border-hover);
  box-shadow:0 4px 24px rgba(0,0,0,0.06),0 1px 4px rgba(0,0,0,0.04);
  transform:translateY(-2px);
}

.card-top{display:flex;align-items:center;gap:10px}

.card-icon{
  width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:var(--bg-tag);
  overflow:hidden;
  transition:background .35s;
}
.card-icon img{width:16px;height:16px;object-fit:contain}
.card-icon .fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);
  font-weight:700;font-size:.7rem;
  color:var(--text-2);
}

.card-title{
  font-weight:600;font-size:.88rem;
  color:var(--text-1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
  transition:color .35s;
}

.card-desc{
  font-size:.78rem;
  color:var(--text-3);
  line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:color .35s;
}

.card-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:auto;padding-top:4px;
}
.card-tag{
  font-family:var(--font-mono);font-size:.65rem;
  color:var(--text-3);
  padding:2px 7px;
  background:var(--bg-tag);
  border-radius:4px;
  letter-spacing:.03em;
  transition:color .35s,background .35s;
}
.card-arrow{
  width:14px;height:14px;
  color:var(--text-3);
  opacity:0;
  transform:translateX(-4px);
  transition:opacity .25s,transform .25s,color .25s;
}
.card-arrow svg{width:100%;height:100%}
.card:hover .card-arrow{opacity:1;transform:translateX(0);color:var(--accent)}

.card-del{
  position:absolute;top:8px;right:8px;
  width:22px;height:22px;
  border-radius:5px;
  background:var(--bg-del);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,background .2s,border-color .2s,color .2s;cursor:pointer;
  color:var(--text-3);
}
.card-del svg{width:12px;height:12px}
.card:hover .card-del{opacity:1}
.card-del:hover{color:#e85d5d;border-color:rgba(232,93,93,0.3);background:rgba(232,93,93,0.1)}

@keyframes cardIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ─── empty ─── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;text-align:center;
}
.empty-icon{
  width:48px;height:48px;
  border:1.5px solid var(--border);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;color:var(--text-3);
}
.empty-icon svg{width:24px;height:24px}
.empty-title{font-family:var(--font-display);font-weight:600;font-size:1.1rem;color:var(--text-2);margin-bottom:8px}
.empty-desc{font-size:.82rem;color:var(--text-3)}

/* ─── modal ─── */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:var(--overlay);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:auto}

.modal{
  width:440px;max-width:90vw;
  background:var(--bg-modal);
  border:1px solid var(--border);
  border-radius:14px;padding:28px;
  transform:translateY(12px) scale(.97);
  transition:transform .3s cubic-bezier(.25,.8,.25,1),background .35s,border-color .35s;
}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}

.modal-title{
  font-family:var(--font-display);
  font-weight:700;font-size:1.15rem;
  margin-bottom:24px;color:var(--text-1);
  transition:color .35s;
}

.field{margin-bottom:16px}
.field-label{
  display:block;
  font-size:.72rem;font-weight:600;
  color:var(--text-2);margin-bottom:6px;
  letter-spacing:.04em;text-transform:uppercase;
  font-family:var(--font-mono);
  transition:color .35s;
}
.field-input,.field-select{
  width:100%;padding:10px 14px;
  background:var(--bg-input);
  border:1px solid var(--border-input);
  border-radius:8px;color:var(--text-1);
  font-family:var(--font-body);font-size:.85rem;
  outline:none;transition:border-color .2s,background .35s,color .35s;
}
.field-input:focus,.field-select:focus{border-color:var(--accent-focus)}
.field-select{cursor:pointer}
.field-select option{background:var(--select-option-bg);color:var(--text-1)}

.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.btn{
  padding:9px 20px;border-radius:8px;
  font-family:var(--font-body);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;border:none;
}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-2)}
.btn-ghost:hover{border-color:var(--text-3);color:var(--text-1)}
.btn-primary{background:var(--accent);color:var(--btn-primary-text)}
.btn-primary:hover{opacity:.88}

/* ─── toast ─── */
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 20px;
  background:var(--bg-modal);border:1px solid var(--border);
  border-radius:8px;font-size:.82rem;color:var(--text-2);
  opacity:0;pointer-events:none;
  transition:all .3s cubic-bezier(.25,.8,.25,1);z-index:2000;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:1100px){.grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}}
@media(max-width:860px){.sidebar{width:220px;min-width:220px}.main{padding-left:24px;padding-right:24px}}
</style>
</head>
<body>

<div id="app" class="layout">

  <!-- loading state -->
  <div v-if="loading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>加载中…</p>
  </div>

  <template v-else>

  <!-- sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark"></div>
      <span class="logo-text">VAULT</span>
      <span class="logo-sub">{{ bookmarks.length }}</span>
    </div>

    <div class="search-wrap">
      <div class="search-inner">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" ref="searchInput" v-model="searchQuery" type="text" placeholder="搜索收藏…">
        <span class="search-kbd" v-show="!searchQuery">/</span>
      </div>
    </div>

    <nav class="nav">
      <div
        v-for="cat in allCats"
        :key="cat.id"
        class="nav-item"
        :class="{ active: activeCat === cat.id, dragging: dragCatId === cat.id, 'drag-over': dragOverCatId === cat.id }"
        :draggable="cat.id !== 'all'"
        @click="activeCat = cat.id"
        @contextmenu.prevent="cat.id !== 'all' && showNavCtxMenu($event, cat.id)"
        @dragstart="cat.id !== 'all' && onNavDragStart($event, cat.id)"
        @dragend="onNavDragEnd"
        @dragover.prevent="cat.id !== 'all' && onNavDragOver($event, cat.id)"
        @dragleave="dragOverCatId = null"
        @drop="onNavDrop($event, cat.id)"
      >
        <span class="nav-icon" v-html="getIcon(cat.icon)"></span>
        <span class="nav-label">{{ cat.label }}</span>
        <span class="nav-count">{{ countByCategory(cat.id) }}</span>
      </div>
    </nav>
  </aside>

  <!-- main -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h1 class="main-title">{{ currentCatLabel }}</h1>
        <span class="main-subtitle">{{ filteredBookmarks.length }} 项</span>
      </div>
      <div class="topbar-right">
        <button class="tb-btn accent" @click="openModal('bookmark')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加收藏
        </button>
        <div class="dropdown" :class="{ open: dropdownOpen }">
          <button class="tb-btn tb-btn-icon" title="更多操作" @click.stop="dropdownOpen = !dropdownOpen">
            <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
          </button>
          <div class="dropdown-menu">
            <button class="dropdown-item" @click="openModal('category'); dropdownOpen = false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
              新增分类
            </button>
            <button class="dropdown-item" @click="exportData(); dropdownOpen = false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              导出数据
            </button>
            <button class="dropdown-item" @click="triggerImport(); dropdownOpen = false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              导入数据
            </button>
          </div>
        </div>
        <button class="tb-btn tb-btn-icon" title="切换主题" @click="toggleTheme">
          <span v-html="theme === 'dark' ? sunIcon : moonIcon"></span>
        </button>
      </div>
      <input type="file" ref="fileImport" accept=".json" style="display:none" @change="importData">
    </div>

    <!-- grid -->
    <div class="grid" v-if="filteredBookmarks.length > 0">
      <a
        v-for="(b, i) in filteredBookmarks"
        :key="b.id"
        class="card"
        :class="{ dragging: dragCardId === b.id, 'drag-over': dragOverCardId === b.id }"
        :href="b.url"
        target="_blank"
        rel="noopener"
        :style="{ animationDelay: Math.min(i * 0.04, 0.5) + 's' }"
        :draggable="!searchQuery"
        @contextmenu.prevent="showCardCtxMenu($event, b.id)"
        @dragstart="onCardDragStart($event, b.id)"
        @dragend="onCardDragEnd"
        @dragover.prevent="onCardDragOver($event, b.id)"
        @dragleave="dragOverCardId = null"
        @drop="onCardDrop($event, b.id)"
      >
        <span class="card-del" title="删除" @click.prevent.stop="deleteBookmark(b.id)">
          <span v-html="iconSVGs.trash"></span>
        </span>
        <div class="card-top">
          <div class="card-icon">
            <template v-if="getFaviconUrl(b.url)">
              <img
                :src="getFaviconUrl(b.url)"
                alt=""
                loading="lazy"
                decoding="async"
                @error="$event.target.style.display='none'; $event.target.nextElementSibling.style.display='flex'"
              >
              <span class="fallback" style="display:none">{{ b.name.charAt(0) }}</span>
            </template>
            <span v-else class="fallback">{{ b.name.charAt(0) }}</span>
          </div>
          <span class="card-title">{{ b.name }}</span>
        </div>
        <div class="card-desc">{{ b.desc }}</div>
        <div class="card-meta">
          <span class="card-tag">{{ getDomain(b.url) }}</span>
          <span class="card-arrow" v-html="iconSVGs.arrow"></span>
        </div>
      </a>
    </div>

    <!-- empty state -->
    <div class="empty" v-else>
      <div class="empty-icon" v-html="iconSVGs.sparkle"></div>
      <div class="empty-title">暂无结果</div>
      <div class="empty-desc">试试其他关键词或切换分类</div>
    </div>
  </main>

  <!-- modal -->
  <div class="modal-overlay" :class="{ open: modalOpen }" @click.self="modalOpen = false">
    <div class="modal">
      <div class="modal-title">{{ modalMode === 'bookmark' ? '添加收藏' : '新增分类' }}</div>

      <div class="field" v-show="modalMode === 'bookmark'">
        <label class="field-label">网址</label>
        <input class="field-input" ref="fieldUrl" v-model="formUrl" type="url" placeholder="https://…">
      </div>
      <div class="field">
        <label class="field-label">名称</label>
        <input class="field-input" ref="fieldName" v-model="formName" type="text" :placeholder="modalMode === 'bookmark' ? '网站名称' : '分类名称'">
      </div>
      <div class="field" v-show="modalMode === 'bookmark'">
        <label class="field-label">描述</label>
        <input class="field-input" v-model="formDesc" type="text" placeholder="简短描述（可选）">
      </div>
      <div class="field" v-show="modalMode === 'bookmark'">
        <label class="field-label">分类</label>
        <select class="field-select" v-model="formCat">
          <option v-for="cat in categories" :key="cat.id" :value="cat.id">{{ cat.label }}</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" @click="modalOpen = false">取消</button>
        <button class="btn btn-primary" @click="saveModal">保存</button>
      </div>
    </div>
  </div>

  <!-- context menu -->
  <teleport to="body">
    <div class="ctx-menu" :class="{ open: ctxOpen }" :style="{ left: ctxX + 'px', top: ctxY + 'px' }">
      <!-- Card context menu -->
      <template v-if="ctxType === 'card'">
        <div class="ctx-header">移动到</div>
        <button
          v-for="cat in moveableCategories"
          :key="cat.id"
          class="ctx-item"
          @click="moveBookmark(ctxTargetId, cat.id)"
        >
          <span v-html="getIcon(cat.icon)"></span>
          {{ cat.label }}
        </button>
        <div class="ctx-sep" v-if="moveableCategories.length"></div>
        <button class="ctx-item danger" @click="deleteBookmark(ctxTargetId); hideCtxMenu()">
          <span v-html="iconSVGs.trash"></span>
          删除收藏
        </button>
      </template>
      <!-- Nav context menu -->
      <template v-if="ctxType === 'nav'">
        <div class="ctx-header">分类操作</div>
        <button class="ctx-item" @click="renameCategory(ctxTargetId)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          重命名
        </button>
        <div class="ctx-sep"></div>
        <button class="ctx-item danger" @click="deleteCategory(ctxTargetId)">
          <span v-html="iconSVGs.trash"></span>
          删除分类 ({{ countByCategory(ctxTargetId) }} 项)
        </button>
      </template>
    </div>
  </teleport>

  <!-- toast -->
  <div class="toast" :class="{ show: toastVisible }">{{ toastMsg }}</div>

  </template>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script>
const { createApp, ref, computed, watch, nextTick, onMounted, onUnmounted } = Vue;

// ─── Constants ───
const STORAGE_KEY = 'vault_bookmarks';
const THEME_KEY = 'vault_theme';
const CAT_KEY = 'vault_categories';

const defaultBookmarks = [];
const defaultCategories = [];

const iconSVGs = {
  grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
  sparkle:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z"/></svg>',
  cpu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>',
  tool:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>',
  diamond:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M11 3l1 6h10"/><path d="M2 9h10l1-6"/><path d="M12 22V9"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>',
  folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>',
};

const sunIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
const moonIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';

// ─── Persistence helpers ───
function loadBookmarks(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length>0)return p}}catch(e){}
  return JSON.parse(JSON.stringify(defaultBookmarks));
}
function loadCategories(){
  try{const s=localStorage.getItem(CAT_KEY);if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length>0)return p}}catch(e){}
  return JSON.parse(JSON.stringify(defaultCategories));
}
function getTheme(){try{return localStorage.getItem(THEME_KEY)||'dark'}catch(e){return'dark'}}

createApp({
  data(){
    // init: clean up bookmarks with invalid category
    const bms = loadBookmarks();
    const cats = loadCategories();
    const validIds = new Set(cats.map(c=>c.id));
    const cleaned = bms.filter(b=>validIds.has(b.category));

    return {
      // state
      bookmarks: cleaned,
      categories: cats,
      activeCat: 'all',
      searchQuery: '',
      theme: getTheme(),

      // modal
      modalOpen: false,
      modalMode: 'bookmark',
      formUrl: '',
      formName: '',
      formDesc: '',
      formCat: '',

      // dropdown
      dropdownOpen: false,

      // context menu
      ctxOpen: false,
      ctxType: null,    // 'card' or 'nav'
      ctxTargetId: null,
      ctxX: 0,
      ctxY: 0,

      // drag state
      dragCardId: null,
      dragOverCardId: null,
      dragCatId: null,
      dragOverCatId: null,

      // toast
      toastMsg: '',
      toastVisible: false,
      toastTimer: null,

      // next id
      nextId: Math.max(...cleaned.map(b=>b.id),0)+1,

      // loading state (waiting for data.json)
      loading: !cleaned.length,

      // constants
      iconSVGs,
      sunIcon,
      moonIcon,
    };
  },

  computed:{
    allCats(){
      return [{id:'all',label:'全部收藏',icon:'grid'},...this.categories];
    },
    filteredBookmarks(){
      let list = this.activeCat==='all'
        ? [...this.bookmarks]
        : this.bookmarks.filter(b=>b.category===this.activeCat);
      if(this.searchQuery){
        const q=this.searchQuery.toLowerCase();
        list=list.filter(b=>
          b.name.toLowerCase().includes(q)||
          b.desc.toLowerCase().includes(q)||
          b.url.toLowerCase().includes(q)
        );
      }
      return list;
    },
    currentCatLabel(){
      const cat=this.allCats.find(c=>c.id===this.activeCat);
      return cat?cat.label:'全部收藏';
    },
    moveableCategories(){
      if(!this.ctxTargetId) return [];
      const bm=this.bookmarks.find(b=>b.id===this.ctxTargetId);
      if(!bm) return [];
      return this.categories.filter(c=>c.id!==bm.category);
    },
  },

  watch:{
    bookmarks:{
      handler(){ this.saveBookmarks() },
      deep:true
    },
    categories:{
      handler(){ this.saveCategories() },
      deep:true
    },
    theme(t){
      document.documentElement.setAttribute('data-theme',t);
      try{localStorage.setItem(THEME_KEY,t)}catch(e){}
    },
    activeCat(){
      // set default formCat when opening modal
      if(this.activeCat!=='all') this.formCat=this.activeCat;
    },
  },

  methods:{
    // ─── Helpers ───
    getDomain(url){try{return new URL(url).hostname.replace('www.','')}catch(e){return''}},
    getFaviconUrl(url){const d=this.getDomain(url);return d?`https://www.google.com/s2/favicons?domain=${d}&sz=64`:''},
    getIcon(name){return iconSVGs[name]||iconSVGs.folder},
    countByCategory(catId){
      if(catId==='all') return this.bookmarks.length;
      return this.bookmarks.filter(b=>b.category===catId).length;
    },

    // ─── Persistence ───
    saveBookmarks(){
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(this.bookmarks))}catch(e){}
    },
    saveCategories(){
      try{localStorage.setItem(CAT_KEY,JSON.stringify(this.categories))}catch(e){}
    },

    // ─── Toast ───
    showToast(msg){
      this.toastMsg=msg;
      this.toastVisible=true;
      clearTimeout(this.toastTimer);
      this.toastTimer=setTimeout(()=>{this.toastVisible=false},2000);
    },

    // ─── Theme ───
    toggleTheme(){
      this.theme = this.theme==='dark'?'light':'dark';
    },

    // ─── Modal ───
    openModal(mode){
      this.modalMode=mode;
      this.formUrl='';
      this.formName='';
      this.formDesc='';
      this.formCat = this.activeCat!=='all'?this.activeCat:(this.categories[0]?.id||'');
      this.modalOpen=true;
      this.$nextTick(()=>{
        if(mode==='bookmark') this.$refs.fieldUrl?.focus();
        else this.$refs.fieldName?.focus();
      });
    },
    saveModal(){
      if(this.modalMode==='bookmark'){
        const url=this.formUrl.trim();
        const name=this.formName.trim();
        if(!url||!name){this.showToast('请填写网址和名称');return}
        this.bookmarks.push({
          id:this.nextId++,
          url,
          name,
          desc:this.formDesc.trim()||this.getDomain(url),
          category:this.formCat
        });
        this.modalOpen=false;
        this.showToast('已添加到收藏');
      } else {
        const label=this.formName.trim();
        if(!label){this.showToast('请填写分类名称');return}
        const id=label.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\u4e00-\u9fff]/g,'')+'_'+Date.now();
        this.categories.push({id,label,icon:'folder'});
        this.modalOpen=false;
        this.showToast(`已添加分类「${label}」`);
      }
    },

    // ─── Bookmark actions ───
    deleteBookmark(id){
      const bm=this.bookmarks.find(b=>b.id===id);
      if(!bm) return;
      this.bookmarks=this.bookmarks.filter(b=>b.id!==id);
      this.showToast(`已移除「${bm.name}」`);
    },
    moveBookmark(bookmarkId, targetCatId){
      const bm=this.bookmarks.find(b=>b.id===bookmarkId);
      if(!bm) return;
      bm.category=targetCatId;
      this.hideCtxMenu();
      const catLabel=this.categories.find(c=>c.id===targetCatId)?.label||targetCatId;
      this.showToast(`已移动到「${catLabel}」`);
    },

    // ─── Category actions ───
    renameCategory(catId){
      this.hideCtxMenu();
      const cat=this.categories.find(c=>c.id===catId);
      if(!cat) return;
      const newLabel=prompt('重命名分类',cat.label);
      if(newLabel&&newLabel.trim()&&newLabel.trim()!==cat.label){
        cat.label=newLabel.trim();
        this.showToast(`已重命名为「${cat.label}」`);
      }
    },
    deleteCategory(catId){
      const cat=this.categories.find(c=>c.id===catId);
      if(!cat) return;
      const remaining=this.categories.filter(c=>c.id!==catId);
      const fallbackId=remaining.length>0?remaining[0].id:null;
      let movedCount=0;
      if(fallbackId){
        this.bookmarks.forEach(b=>{
          if(b.category===catId){b.category=fallbackId;movedCount++}
        });
      } else {
        movedCount=this.bookmarks.filter(b=>b.category===catId).length;
      }
      this.categories=this.categories.filter(c=>c.id!==catId);
      if(this.activeCat===catId) this.activeCat='all';
      this.hideCtxMenu();
      const movedMsg=fallbackId
        ?`，${movedCount} 项已移至「${remaining[0].label}」`
        :(movedCount>0?`，${movedCount} 项保留在全部收藏中`:'');
      this.showToast(`已删除分类「${cat.label}」${movedMsg}`);
    },

    // ─── Context Menu ───
    showCardCtxMenu(e,id){
      this.ctxType='card';
      this.ctxTargetId=id;
      this.ctxX=Math.min(e.clientX,window.innerWidth-190);
      this.ctxY=Math.min(e.clientY,window.innerHeight-250);
      this.ctxOpen=true;
    },
    showNavCtxMenu(e,catId){
      this.ctxType='nav';
      this.ctxTargetId=catId;
      this.ctxX=Math.min(e.clientX,window.innerWidth-190);
      this.ctxY=Math.min(e.clientY,window.innerHeight-200);
      this.ctxOpen=true;
    },
    hideCtxMenu(){
      this.ctxOpen=false;
      this.ctxType=null;
      this.ctxTargetId=null;
    },

    // ─── Card Drag & Drop ───
    onCardDragStart(e,id){
      if(this.searchQuery){e.preventDefault();return}
      this.dragCardId=id;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain','drag');
    },
    onCardDragEnd(){
      this.dragCardId=null;
      this.dragOverCardId=null;
    },
    onCardDragOver(e,id){
      if(this.searchQuery) return;
      if(this.dragCardId!==null && this.dragCardId!==id){
        this.dragOverCardId=id;
      }
    },
    onCardDrop(e,targetId){
      e.preventDefault();
      this.dragOverCardId=null;
      if(this.dragCardId===null||this.dragCardId===targetId) return;
      const fromIdx=this.bookmarks.findIndex(b=>b.id===this.dragCardId);
      const toIdx=this.bookmarks.findIndex(b=>b.id===targetId);
      if(fromIdx===-1||toIdx===-1) return;
      const [moved]=this.bookmarks.splice(fromIdx,1);
      this.bookmarks.splice(toIdx,0,moved);
      this.dragCardId=null;
    },

    // ─── Nav Drag & Drop ───
    onNavDragStart(e,catId){
      this.dragCatId=catId;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain','drag');
    },
    onNavDragEnd(){
      this.dragCatId=null;
      this.dragOverCatId=null;
    },
    onNavDragOver(e,catId){
      if(catId==='all') return;
      if(this.dragCatId && this.dragCatId!==catId){
        this.dragOverCatId=catId;
      }
    },
    onNavDrop(e,targetCatId){
      e.preventDefault();
      this.dragOverCatId=null;
      if(!this.dragCatId||this.dragCatId===targetCatId||targetCatId==='all') return;
      const fromIdx=this.categories.findIndex(c=>c.id===this.dragCatId);
      const toIdx=this.categories.findIndex(c=>c.id===targetCatId);
      if(fromIdx===-1||toIdx===-1) return;
      const [moved]=this.categories.splice(fromIdx,1);
      this.categories.splice(toIdx,0,moved);
      this.dragCatId=null;
    },

    // ─── Export / Import ───
    exportData(){
      const data=JSON.stringify({bookmarks:this.bookmarks,categories:this.categories},null,2);
      const blob=new Blob([data],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`vault-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
      this.showToast('已导出数据');
    },
    triggerImport(){
      this.$refs.fileImport.click();
    },
    importData(e){
      const file=e.target.files[0];
      if(!file) return;
      const reader=new FileReader();
      reader.onload=(ev)=>{
        try{
          const data=JSON.parse(ev.target.result);
          const imported=Array.isArray(data)?data:(data.bookmarks||[]);
          const importedCats=Array.isArray(data)?[]:(data.categories||[]);
          const existingUrls=new Set(this.bookmarks.map(b=>b.url));
          let added=0;
          imported.forEach(item=>{
            if(item.url&&item.name&&!existingUrls.has(item.url)){
              this.bookmarks.push({
                id:this.nextId++,
                url:item.url,
                name:item.name,
                desc:item.desc||this.getDomain(item.url),
                category:item.category||'inspiration'
              });
              added++;
            }
          });
          if(importedCats.length){
            const existingIds=new Set(this.categories.map(c=>c.id));
            importedCats.forEach(c=>{
              if(c.id&&c.label&&!existingIds.has(c.id)){this.categories.push(c)}
            });
          }
          this.showToast(added>0?`已导入 ${added} 条收藏`:'没有新增内容');
        }catch(err){
          this.showToast('解析文件失败');
        }
      };
      reader.readAsText(file);
      e.target.value='';
    },

    // ─── Global keyboard shortcuts ───
    handleKeydown(e){
      if(e.key==='/'&&document.activeElement!==this.$refs.searchInput){
        e.preventDefault();
        this.$refs.searchInput?.focus();
      }
      if(e.key==='Escape'){
        if(this.ctxOpen) this.hideCtxMenu();
        else if(this.dropdownOpen) this.dropdownOpen=false;
        else if(this.modalOpen) this.modalOpen=false;
        else{
          this.$refs.searchInput?.blur();
          this.searchQuery='';
        }
      }
    },
    handleGlobalClick(){
      if(this.dropdownOpen) this.dropdownOpen=false;
      if(this.ctxOpen) this.hideCtxMenu();
    },
  },

  mounted(){
    // apply theme
    document.documentElement.setAttribute('data-theme',this.theme);

    // fetch data.json as default data source if localStorage is empty
    if(this.loading){
      fetch('data.json')
        .then(r=>r.json())
        .then(data=>{
          if(!this.bookmarks.length && Array.isArray(data.bookmarks)){
            this.bookmarks = data.bookmarks;
            this.nextId = Math.max(...data.bookmarks.map(b=>b.id),0)+1;
          }
          if(!this.categories.length && Array.isArray(data.categories)){
            this.categories = data.categories;
          }
          this.saveBookmarks();
          this.saveCategories();
          this.loading = false;
        })
        .catch(err=>{ console.warn('加载 data.json 失败', err); this.loading = false; });
    } else {
      // persist cleaned bookmarks if needed
      this.saveBookmarks();
    }

    // global keyboard
    this._keydownHandler = (e)=>this.handleKeydown(e);
    document.addEventListener('keydown',this._keydownHandler);

    // global click to close menus
    this._clickHandler = ()=>this.handleGlobalClick();
    document.addEventListener('click',this._clickHandler);
  },

  beforeUnmount(){
    document.removeEventListener('keydown',this._keydownHandler);
    document.removeEventListener('click',this._clickHandler);
    clearTimeout(this.toastTimer);
  },
}).mount('#app');
</script>
</body>
</html>
